repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        language: system
        types_or: [python, pyi]
        entry: uv run ruff check --force-exclude
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff-format
        language: system
        types_or: [python, pyi]
        entry: uv run ruff format --force-exclude
      - id: mypy
        name: mypy
        language: system
        types_or: [python, pyi]
        entry: uv run mypy .
        pass_filenames: false
        priority: 100
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.14
    hooks:
      - id: uv-lock
