version: 2
updates:
  # Python dependencies (uv)
  - package-ecosystem: uv
    directories:
      - projects/worker
      - projects/tgm_bot
      - projects/env_validator
      - projects/env_helper
      - projects/cb_receiver
      - libs/vtt_common
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"

  # Node.js dependencies (npm) — tunnel
  - package-ecosystem: npm
    directory: projects/cb_receiver/tunnel
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Docker base images
  - package-ecosystem: docker
    directories:
      - projects/worker
      - projects/tgm_bot
      - projects/env_validator
      - projects/env_helper
      - projects/cb_receiver
      - nginx
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
